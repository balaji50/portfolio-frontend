<section id="skills" class="section-padding bg-subtle">
  <div class="container">

    <div class="section-header text-center mb-5">
      <span class="section-label">Expertise</span>
      <h2 class="section-title">Skills & <span class="text-accent">Technologies</span></h2>
    </div>

    <div class="row g-4">
      <div class="col-md-6 col-lg-4" *ngFor="let group of skillGroups">
        <div class="skill-group-card">
          <h4 class="group-title">
            <span class="group-icon">
              <i class="bi" [class.bi-display]="group.category === 'Frontend'"
                           [class.bi-server]="group.category === 'Backend'"
                           [class.bi-tools]="group.category === 'DevOps'"
                           [class.bi-grid]="!['Frontend','Backend','DevOps'].includes(group.category)">
              </i>
            </span>
            {{ group.category }}
          </h4>
          <div class="skill-list">
            <div class="skill-item" *ngFor="let skill of group.skills">
              <div class="skill-meta">
                <span class="skill-name">{{ skill.name }}</span>
                <span class="skill-pct">{{ skill.level }}%</span>
              </div>
              <div class="skill-bar">
                <div class="skill-fill" [style.width.%]="skill.level"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
