<section id="about" class="section-padding bg-subtle" *ngIf="profile">
  <div class="container">

    <div class="row align-items-center g-5">

      <!-- Text -->
      <div class="col-lg-6">
        <span class="section-label">About Me</span>
        <h2 class="section-title mt-2 mb-4">
          Passionate about <span class="text-accent">building things</span>
        </h2>
        <p class="about-bio">{{ profile.bio }}</p>

        <div class="about-details mt-4">
          <div class="detail-row" *ngIf="profile.location">
            <i class="bi bi-geo-alt-fill"></i>
            <span>{{ profile.location }}</span>
          </div>
          <div class="detail-row" *ngIf="profile.email">
            <i class="bi bi-envelope-fill"></i>
            <span>{{ profile.email }}</span>
          </div>
        </div>

        <div class="social-links mt-4 d-flex gap-3">
          <a [href]="profile.github"   target="_blank" class="social-btn" *ngIf="profile.github">
            <i class="bi bi-github"></i> GitHub
          </a>
          <a [href]="profile.linkedin" target="_blank" class="social-btn" *ngIf="profile.linkedin">
            <i class="bi bi-linkedin"></i> LinkedIn
          </a>
        </div>
      </div>

      <!-- Experience timeline -->
      <div class="col-lg-6">
        <h3 class="mb-4 fw-bold" style="color:#fff">Experience</h3>
        <div class="timeline">
          <div class="timeline-item" *ngFor="let exp of profile.experience">
            <div class="timeline-dot" [class.current]="exp.current"></div>
            <div class="timeline-body">
              <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                  <h5 class="timeline-role">{{ exp.role }}</h5>
                  <span class="timeline-company">{{ exp.company }}</span>
                </div>
                <span class="timeline-period">{{ exp.period }}</span>
              </div>
              <p class="timeline-desc">{{ exp.description }}</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
